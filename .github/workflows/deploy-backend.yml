name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

env:
  ACR_NAME: cnwangwuweatherapi
  IMAGE_NAME: cnwangwuweatherapi.azurecr.io/weather-api
  CONTAINER_APP_NAME: weather-api-app
  RESOURCE_GROUP: weather-api-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build, Push, Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest ./server
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }}
